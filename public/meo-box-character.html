<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meo Box Character</title>
    <style>
      :root {
        --paper: #ffffff;
        --ink: #000000;
        --soft: #eeeeee;
        --shade: #a8a8a8;
        --shade-dark: #747474;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(
          circle at 50% 46%,
          #ffffff 0 32%,
          #f7f7f7 52%,
          #eeeeee 100%
        );
        color: var(--ink);
        overflow: hidden;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .character-stage {
        width: clamp(320px, 44vw, 620px);
        max-width: calc(100vw - 48px);
        max-height: calc(100dvh - 48px);
        display: grid;
        place-items: center;
      }

      .character-svg {
        width: min(100%, 66dvh);
        max-height: 82dvh;
        height: auto;
        display: block;
        overflow: visible;
        filter: drop-shadow(10px 14px 0 rgba(0, 0, 0, 0.08));
      }

      .character {
        transform-box: view-box;
        transform-origin: 450px 610px;
        animation: meo-breathe 3.8s ease-in-out infinite;
        will-change: transform;
      }

      .character[data-animation="wobble"] {
        animation: meo-wobble 1.15s ease-in-out infinite;
      }

      .character[data-animation="hop"] {
        animation: meo-hop 0.95s ease-in-out infinite;
      }

      .character[data-animation="squash"] {
        animation: meo-squash 1.25s ease-in-out infinite;
      }

      .character[data-animation="wave"] {
        animation: meo-wave 2.15s ease-in-out infinite;
      }

      .character[data-animation="none"] {
        animation: none;
      }

      .ink-line {
        fill: none;
        stroke: var(--ink);
        stroke-width: 17;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .ink-line-heavy {
        fill: none;
        stroke: var(--ink);
        stroke-width: 21;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .ear-line {
        fill: none;
        stroke: var(--ink);
        stroke-width: 21;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .head-box-line {
        fill: none;
        stroke: var(--ink);
        stroke-width: 21;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .box-fill,
      .eye-fill {
        fill: var(--paper);
      }

      .eye-line {
        fill: var(--paper);
        stroke: var(--ink);
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .mouth-line {
        fill: none;
        stroke: var(--ink);
        stroke-width: 17;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .expression-line {
        fill: none;
        stroke: var(--ink);
        stroke-width: 13;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .sleep-z {
        fill: var(--ink);
        font-family: "Comic Sans MS", "Arial Black", sans-serif;
        font-size: 44px;
        font-weight: 900;
      }

      .body-fill {
        fill: url(#bodyShade);
      }

      .pants-fill {
        fill: url(#pantsShade);
      }

      .pants-seam {
        fill: none;
        stroke: var(--ink);
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .whisker {
        fill: none;
        stroke: #808080;
        stroke-width: 9;
        stroke-linecap: round;
      }

      .pupil {
        fill: var(--ink);
      }

      .eye {
        transform-box: fill-box;
        transform-origin: center;
        animation: meo-eye-blink 7.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        will-change: transform;
      }

      .eye-right {
        animation-delay: 12ms;
      }

      .character:not([data-expression="stable"]) .eye {
        animation: none;
      }

      .left-arm,
      .right-arm,
      .left-leg,
      .right-leg {
        transform-box: fill-box;
      }

      .debug-toggle {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 20;
        min-width: 88px;
        min-height: 44px;
        border: 3px solid var(--ink);
        border-radius: 6px;
        background: var(--paper);
        color: var(--ink);
        box-shadow: 4px 4px 0 var(--ink);
        cursor: pointer;
        font-weight: 700;
      }

      .debug-toggle:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--ink);
      }

      .debug-panel {
        position: fixed;
        right: 24px;
        bottom: 78px;
        z-index: 19;
        width: min(320px, calc(100vw - 48px));
        max-height: calc(100dvh - 104px);
        padding: 16px;
        overflow-y: auto;
        border: 3px solid var(--ink);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 6px 6px 0 var(--ink);
      }

      .debug-panel[hidden] {
        display: none;
      }

      .debug-panel-title {
        margin: 0 0 10px;
        font-size: 18px;
        font-weight: 700;
      }

      .debug-control {
        display: grid;
        gap: 6px;
        margin-bottom: 10px;
      }

      .debug-control-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
        font-weight: 700;
      }

      .debug-control-number {
        width: 74px;
        min-height: 36px;
        border: 2px solid var(--ink);
        border-radius: 4px;
        background: var(--paper);
        color: var(--ink);
        text-align: right;
        font-size: 16px;
        font-variant-numeric: tabular-nums;
      }

      .debug-control input[type="range"] {
        width: 100%;
        accent-color: var(--ink);
      }

      .state-control,
      .animation-control {
        display: grid;
        gap: 8px;
        margin: 14px 0 10px;
        padding-top: 12px;
        border-top: 2px dashed var(--ink);
      }

      .state-control-label,
      .animation-control-label {
        font-size: 14px;
        font-weight: 700;
      }

      .state-control-select,
      .animation-control-select {
        min-height: 44px;
        width: 100%;
        border: 2px solid var(--ink);
        border-radius: 6px;
        background: var(--paper);
        color: var(--ink);
        cursor: pointer;
        font-weight: 700;
      }

      .debug-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 4px;
      }

      .debug-save,
      .debug-reset {
        min-height: 44px;
        padding: 0 14px;
        border: 2px solid var(--ink);
        border-radius: 6px;
        background: var(--paper);
        color: var(--ink);
        cursor: pointer;
        font-weight: 700;
      }

      .debug-save {
        background: var(--ink);
        color: var(--paper);
      }

      .debug-save:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .debug-save-status {
        min-height: 16px;
        margin: 8px 0 0;
        color: #404040;
        font-size: 13px;
        font-weight: 700;
      }

      @keyframes meo-breathe {
        0%,
        100% {
          transform: translateY(0) rotate(-0.25deg);
        }

        50% {
          transform: translateY(-5px) rotate(0.3deg);
        }
      }

      @keyframes meo-wobble {
        0%,
        100% {
          transform: translateY(0) rotate(-1.8deg) scale(1);
        }

        22% {
          transform: translateY(-3px) rotate(2.4deg) scale(1);
        }

        48% {
          transform: translateY(1px) rotate(-2.6deg) scale(1);
        }

        74% {
          transform: translateY(-1px) rotate(1.9deg) scale(1);
        }
      }

      @keyframes meo-hop {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }

        38% {
          transform: translateY(-20px) scale(1.03);
        }

        58% {
          transform: translateY(0) scale(1.05, 0.96);
        }
      }

      @keyframes meo-squash {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }

        35% {
          transform: translateY(6px) scale(1.08, 0.92);
        }

        62% {
          transform: translateY(-4px) scale(0.97, 1.04);
        }
      }

      @keyframes meo-wave {
        0%,
        100% {
          transform: translateY(0) rotate(-0.8deg) scale(1);
        }

        25% {
          transform: translateY(-4px) rotate(1.1deg) scale(1.01);
        }

        50% {
          transform: translateY(1px) rotate(0.6deg) scale(1);
        }

        75% {
          transform: translateY(-3px) rotate(-1.2deg) scale(1.01);
        }
      }

      @keyframes meo-eye-blink {
        0%,
        10.5%,
        13.5%,
        56%,
        58.5%,
        61.5%,
        64%,
        100% {
          transform: scaleY(1);
        }

        12%,
        57.2%,
        62.8% {
          transform: scaleY(0.08);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .character,
        .eye {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main
      class="character-stage"
      aria-label="A black and white sketch character with a box-shaped head"
    >
      <svg
        class="character-svg"
        viewBox="0 0 900 1120"
        role="img"
        aria-labelledby="characterTitle characterDesc"
        xmlns="http://www.w3.org/2000/svg"
      >
        <title id="characterTitle">Meo box character</title>
        <desc id="characterDesc">
          A hand-drawn black and white character with a square box head,
          triangle ears, round eyes, a small number-three mouth, whiskers, gray
          body, thin arms, and stick legs.
        </desc>

        <defs>
          <linearGradient
            id="bodyShade"
            x1="315"
            y1="510"
            x2="585"
            y2="780"
            gradientUnits="userSpaceOnUse"
          >
            <stop offset="0" stop-color="#d4d4d4" />
            <stop offset="0.6" stop-color="#bababa" />
            <stop offset="1" stop-color="#979797" />
          </linearGradient>

          <linearGradient
            id="pantsShade"
            x1="310"
            y1="750"
            x2="590"
            y2="850"
            gradientUnits="userSpaceOnUse"
          >
            <stop offset="0" stop-color="#8e8e8e" />
            <stop offset="1" stop-color="#686868" />
          </linearGradient>

          <filter id="roughen">
            <feTurbulence
              baseFrequency="0.012"
              numOctaves="2"
              seed="7"
              type="fractalNoise"
            />
            <feDisplacementMap in="SourceGraphic" scale="1.8" />
          </filter>
        </defs>

        <g class="character" data-animation="idle" data-expression="stable">
          <g class="ears" data-head-part filter="url(#roughen)">
            <g class="left-ear" data-left-ear>
              <path
                class="ear-line"
                data-ear-line
                d="M254 205 C174 216 165 220 170 243 C176 270 225 333 263 365"
              />
              <path class="ink-line" d="M254 249 L211 257 L264 327" />
            </g>
            <g class="right-ear" data-right-ear>
              <path
                class="ear-line"
                data-ear-line
                d="M646 205 C726 216 735 220 730 243 C724 270 675 333 637 365"
              />
              <path class="ink-line" d="M646 249 L689 257 L636 327" />
            </g>
          </g>

          <g class="legs" filter="url(#roughen)">
            <path
              class="left-leg ink-line-heavy"
              d="M374 829 L374 1004 Q370 1030 351 1032"
            />
            <path
              class="right-leg ink-line-heavy"
              d="M526 829 L526 1004 Q530 1030 549 1032"
            />
          </g>

          <g class="body" filter="url(#roughen)">
            <path
              class="body-fill ink-line-heavy"
              d="M377 528 L523 528 L566 786 Q526 810 455 811 Q383 812 334 786 Z"
            />
            <path
              class="pants-fill ink-line-heavy"
              data-pants-path
              d="M334 786 Q392 816 450 816 Q508 817 566 786 L587 867 Q526 888 458 878 Q444 876 430 878 Q365 888 313 867 Z"
            />
            <path class="ink-line" d="M336 789 Q412 823 564 789" />
            <path class="pants-seam" data-pants-seam d="M450 818 Q451 846 450 872" />
          </g>

          <g class="arms" filter="url(#roughen)">
            <path
              class="left-arm ink-line-heavy"
              data-left-arm
              d="M362 544 C335 633 318 706 301 795"
            />
            <circle class="pupil" data-left-hand cx="298" cy="815" r="23" />
            <path
              class="right-arm ink-line-heavy"
              data-right-arm
              d="M538 544 C565 633 582 706 599 795"
            />
            <circle class="pupil" data-right-hand cx="602" cy="815" r="23" />
          </g>

          <g class="head" data-head-part filter="url(#roughen)">
            <path
              class="box-fill head-box-line"
              data-head-box-line
              d="M250 214 H650 L640 518 Q640 538 620 539 H280 Q260 538 260 518 Z"
            />
            <path
              class="box-fill head-box-line"
              data-head-box-line
              d="M250 214 L315 158 H585 L650 214 Z"
            />
            <path class="head-box-line" data-head-box-line d="M250 214 H650" />
          </g>

          <g class="face" data-head-part>
            <g class="eye eye-left">
              <ellipse
                class="eye-line"
                data-eye-line
                cx="369"
                cy="335"
                rx="44"
                ry="58"
              />
              <circle class="pupil" cx="379" cy="340" r="15" />
            </g>

            <g class="eye eye-right">
              <ellipse
                class="eye-line"
                data-eye-line
                cx="531"
                cy="335"
                rx="44"
                ry="58"
              />
              <circle class="pupil" cx="521" cy="340" r="15" />
            </g>

            <g class="expression-eyes">
              <path class="expression-line" data-left-brow d="" />
              <path class="expression-line" data-right-brow d="" />
              <path class="expression-line" data-left-closed-eye d="" />
              <path class="expression-line" data-right-closed-eye d="" />
            </g>

            <g class="mouth" data-mouth-group>
              <path
                class="mouth-line"
                data-mouth-line
                d="M449 409 C474 392 487 421 458 424 C489 431 475 467 445 453"
              />
            </g>
            <g class="sleep-zs" data-sleep-zs aria-hidden="true">
              <text class="sleep-z" x="676" y="216" transform="rotate(-9 676 216)">
                Z
              </text>
              <text class="sleep-z" x="648" y="267" transform="rotate(8 648 267)">
                Z
              </text>
              <text class="sleep-z" x="687" y="320" transform="rotate(-7 687 320)">
                Z
              </text>
            </g>
            <path class="whisker" d="M556 412 Q575 407 589 405" />
            <path class="whisker" d="M558 432 Q580 436 593 445" />
          </g>
        </g>
      </svg>
    </main>

        "rightArmCurve2Y": 0,
        "leftEarScale": 1,

        "rightEarY": 0,
        "leftBrowX": 0,

        "rightBrowX": 0,
        "rightBrowY": 0,
        "browCurve": 0,
        "leftPupilX": 0,
        "leftPupilY": 0,

        "rightPupilSize": 0,
        "leftBrowLength": 0,

        "faceExpression": "stable",
        "bodyAnimation": "idle"
      }
    </script>

    <button
      class="debug-toggle"
      type="button"
      aria-expanded="false"
      aria-controls="debugPanel"
      data-debug-toggle
    >
      Debug
    </button>

    <aside class="debug-panel" id="debugPanel" hidden data-debug-panel>
      <p class="debug-panel-title">Character Debug</p>

      <label class="debug-control">
        <span class="debug-control-row">
          <span>Eye radius X</span>
          <input

            type="text"
            inputmode="numeric"

          />
        </span>
        <input
          type="range"
          min="32"
          max="62"
          step="1"
          value="44"
          data-control="eyeRx"
        />
      </label>

      <label class="debug-control">
        <span class="debug-control-row">
          <span>Eye radius Y</span>
          <input
            class="debug-control-number"
            type="text"
            inputmode="numeric"
            value="58"
            aria-label="Eye radius Y value"
            data-number="eyeRy"
          />
        </span>
        <input
          type="range"
          min="32"
          max="68"
          step="1"
          value="58"
          data-control="eyeRy"
        />
      </label>

      <label class="debug-control">
        <span class="debug-control-row">
          <span>Eye X</span>

            class="debug-control-number"
            type="text"
            inputmode="numeric"
            value="0"

        </span>
        <input
          type="range"
          min="-35"

          value="0"

      </label>

      <label class="debug-control">
        <span class="debug-control-row">
          <span>Eye Y</span>
          <input
            class="debug-control-number"
            type="text"
            inputmode="numeric"
            value="0"

            data-number="eyeY"
          />
        </span>
        <input

          min="-35"
          max="35"

      <label class="debug-control">

            value="0"

        <input

          step="1"

      <label class="debug-control">

      <label class="debug-control">

      <label class="debug-control">
        <span class="debug-control-row">
          <span>Mouth X</span>
          <input

            type="text"
            inputmode="numeric"
            value="0"
            aria-label="Mouth X value"

        </span>
        <input
          type="range"
          min="-45"

          step="1"

      <label class="debug-control">

            inputmode="numeric"
            value="0"

        <input

      </label>

      <label class="debug-control">
        <span class="debug-control-row">

          <input

            value="1"

        </span>
        <input
          type="range"
          min="0.85"
          max="1.35"
          step="0.01"
          value="1"
          data-control="headScaleX"
        />
      </label>

      <label class="debug-control">
        <span class="debug-control-row">
          <span>Head height</span>
          <input
            class="debug-control-number"
            type="text"
            inputmode="decimal"
            value="1"
            aria-label="Head height value"
            data-number="headScaleY"
          />

          line: document.querySelector(".eye-right [data-eye-line]"),
          pupil: document.querySelector(".eye-right .pupil"),
          lineCx: 531,
          lineCy: 335,
          pupilCx: 521,
          pupilCy: 340,
          pupilR: 15,
          direction: 1,
        },
      };
      const mouthLine = document.querySelector("[data-mouth-line]");
      const mouthGroup = document.querySelector("[data-mouth-group]");
      const leftBrow = document.querySelector("[data-left-brow]");
      const rightBrow = document.querySelector("[data-right-brow]");
      const leftClosedEye = document.querySelector("[data-left-closed-eye]");
      const rightClosedEye = document.querySelector("[data-right-closed-eye]");
      const sleepZs = document.querySelector("[data-sleep-zs]");
      const headParts = [...document.querySelectorAll("[data-head-part]")];
      const headBoxLines = [...document.querySelectorAll("[data-head-box-line]")];
      const earLines = [...document.querySelectorAll("[data-ear-line]")];
      const pantsPath = document.querySelector("[data-pants-path]");
      const pantsSeam = document.querySelector("[data-pants-seam]");
      const leftArm = document.querySelector("[data-left-arm]");
      const rightArm = document.querySelector("[data-right-arm]");
      const leftHand = document.querySelector("[data-left-hand]");
      const rightHand = document.querySelector("[data-right-hand]");
      const leftEar = document.querySelector("[data-left-ear]");
      const rightEar = document.querySelector("[data-right-ear]");
      const controlLimits = Object.fromEntries(
        controls.map((control) => [
          control.dataset.control,
          { min: Number(control.min), max: Number(control.max) },
        ]),
      );

      const readEmbeddedConfig = () => {
        try {
          return {
            ...fallbackDebugDefaults,
            ...JSON.parse(configNode.textContent),
          };
        } catch {
          return { ...fallbackDebugDefaults };
        }
      };

      const debugDefaults = readEmbeddedConfig();
      const debugKeys = Object.keys(fallbackDebugDefaults);
      const decimalDebugKeys = new Set([
        "mouthScale",
        "headScaleX",
        "headScaleY",
        "leftEarScale",
        "rightEarScale",
      ]);
      const stableMouthPath =
        "M449 409 C474 392 487 421 458 424 C489 431 475 467 445 453";
      const facePresets = {
        stable: {
          eyes: {
            mode: "open",
            left: { rx: 44, ry: 58, cx: 369, cy: 335, pupilCx: 379, pupilCy: 340 },
            right: { rx: 44, ry: 58, cx: 531, cy: 335, pupilCx: 521, pupilCy: 340 },
          },
          mouth: { d: stableMouthPath, fill: "none" },
        },
        "needs-care": {
          eyes: {
            mode: "open",
            left: { rx: 28, ry: 33, cx: 374, cy: 356, pupilCx: 373, pupilCy: 364, pupilR: 12 },
            right: { rx: 28, ry: 33, cx: 526, cy: 356, pupilCx: 527, pupilCy: 364, pupilR: 12 },
          },
          brows: {
            left: {
              start: [335, 331],
              control: [360, 312],
              end: [390, 313],
            },
            right: {
              start: [510, 313],
              control: [540, 312],
              end: [565, 331],
            },
          },
          mouth: { d: "M435 462 Q450 441 465 462", fill: "none" },
        },
        critical: {
          eyes: {
            mode: "open",
            left: { rx: 43, ry: 56, cx: 368, cy: 344, pupilCx: 368, pupilCy: 344, hidePupil: true },
            right: { rx: 43, ry: 56, cx: 532, cy: 344, pupilCx: 532, pupilCy: 344, hidePupil: true },
          },
          brows: {
            left: {
              start: [337, 291],
              control: [370, 319],
              end: [400, 289],
            },
            right: {
              start: [500, 289],
              control: [530, 319],
              end: [563, 291],
            },
          },
          mouth: {
            d: "M417 467 Q450 423 486 467 Q450 448 417 467 Z",
            fill: "var(--paper)",
          },
        },
        excellent: {
          eyes: {
            mode: "closed",
            left: "M333 354 Q368 304 403 354",
            right: "M497 354 Q532 304 567 354",
          },
          mouth: {
            d: "M416 398 H484 Q478 463 450 464 Q422 463 416 398 Z",
            fill: "var(--paper)",
          },
        },
        sleeping: {
          eyes: {
            mode: "closed",
            left: "M333 360 Q368 392 403 360",
            right: "M497 360 Q532 392 567 360",
          },
          mouth: { d: stableMouthPath, fill: "none" },
          zzz: true,
        },
      };

      const readDebugState = () => {
        try {
          return {
            ...debugDefaults,
            ...JSON.parse(localStorage.getItem(debugStorageKey)),
          };
        } catch {
          return { ...debugDefaults };
        }
      };

      let debugState = readDebugState();

      const readAnimationState = () => {
        const savedAnimation = localStorage.getItem(animationStorageKey);
        const embeddedAnimation = debugDefaults.bodyAnimation;
        const preferredAnimation = savedAnimation || embeddedAnimation;

        if (preferredAnimation === "sway") {
          return "wave";
        }

        return allowedAnimations.has(preferredAnimation)
          ? preferredAnimation
          : "idle";
      };

      const readFaceExpressionState = () => {
        const savedFaceExpression = localStorage.getItem(faceStorageKey);
        const embeddedFaceExpression = debugDefaults.faceExpression;
        const preferredFaceExpression =
          savedFaceExpression || embeddedFaceExpression;

        return allowedFaceExpressions.has(preferredFaceExpression)
          ? preferredFaceExpression
          : "stable";
      };

      let faceExpressionState = readFaceExpressionState();
      let animationState = readAnimationState();

      const applyAnimationState = (animationName, shouldSave = false) => {
        const nextAnimation = allowedAnimations.has(animationName)
          ? animationName
          : "idle";

        animationState = nextAnimation;
        character.dataset.animation = nextAnimation;
        animationSelect.value = nextAnimation;

        if (shouldSave) {
          localStorage.setItem(animationStorageKey, nextAnimation);
        }
      };

      const setPathVisibility = (path, shouldShow) => {
        path.style.display = shouldShow ? "" : "none";
      };

      const buildAdjustableBrowPath = (browPreset, side) => {
        if (!browPreset) {
          return "";
        }

        if (typeof browPreset === "string") {
          return browPreset;
        }

        const browX = side === "left" ? debugState.leftBrowX : debugState.rightBrowX;
        const browY = side === "left" ? debugState.leftBrowY : debugState.rightBrowY;
        const browLength =
          side === "left" ? debugState.leftBrowLength : debugState.rightBrowLength;
        const [startX, startY] = browPreset.start;
        const [controlX, controlY] = browPreset.control;
        const [endX, endY] = browPreset.end;
        const browDeltaX = endX - startX;
        const browDeltaY = endY - startY;
        const browDistance = Math.hypot(browDeltaX, browDeltaY) || 1;
        const lengthOffsetX = (browDeltaX / browDistance) * (browLength / 2);
        const lengthOffsetY = (browDeltaY / browDistance) * (browLength / 2);

        return `M${startX + browX - lengthOffsetX} ${
          startY + browY - lengthOffsetY
        } Q${controlX + browX} ${
          controlY + browY + debugState.browCurve
        } ${endX + browX + lengthOffsetX} ${endY + browY + lengthOffsetY}`;
      };

      const getPupilAdjustment = (side) =>
        side === "left"
          ? {
              x: debugState.leftPupilX,
              y: debugState.leftPupilY,
              size: debugState.leftPupilSize,
            }
          : {
              x: debugState.rightPupilX,
              y: debugState.rightPupilY,
              size: debugState.rightPupilSize,
            };

      const applyFaceExpressionState = (
        expressionName,
        shouldSave = false,
        shouldSyncAnimation = false,
      ) => {
        const nextExpression = allowedFaceExpressions.has(expressionName)
          ? expressionName
          : "stable";
        const preset = facePresets[nextExpression] || facePresets.stable;

        faceExpressionState = nextExpression;
        character.dataset.expression = nextExpression;
        faceExpressionSelect.value = nextExpression;

        Object.entries(eyeParts).forEach(([side, eyePart]) => {
          const stableEyeOffset =
            debugState.eyeX + debugState.eyeSpacing * eyePart.direction;
          const eyePreset =
            nextExpression === "stable"
              ? {
                  rx: debugState.eyeRx,
                  ry: debugState.eyeRy,
                  cx: eyePart.lineCx + stableEyeOffset,
                  cy: eyePart.lineCy + debugState.eyeY,
                  pupilCx: eyePart.pupilCx + stableEyeOffset,
                  pupilCy: eyePart.pupilCy + debugState.eyeY,
                  pupilR: eyePart.pupilR,
                }
              : preset.eyes.mode === "open"
                ? preset.eyes[side]
                : null;

          eyePart.group.style.display = eyePreset ? "" : "none";
          eyePart.group.removeAttribute("transform");

          if (!eyePreset) {
            return;
          }

          eyePart.line.setAttribute("cx", eyePreset.cx);
          eyePart.line.setAttribute("cy", eyePreset.cy);
          eyePart.line.setAttribute("rx", eyePreset.rx);
          eyePart.line.setAttribute("ry", eyePreset.ry);
          eyePart.line.style.strokeWidth = debugState.eyeStroke;
          const pupilAdjustment = getPupilAdjustment(side);
          const pupilRadius = Math.max(
            1,
            (eyePreset.pupilR ?? eyePart.pupilR) + pupilAdjustment.size,
          );

          eyePart.pupil.setAttribute("cx", eyePreset.pupilCx + pupilAdjustment.x);
          eyePart.pupil.setAttribute("cy", eyePreset.pupilCy + pupilAdjustment.y);
          eyePart.pupil.setAttribute("r", pupilRadius);
          eyePart.pupil.style.display = eyePreset.hidePupil ? "none" : "";
        });

        const hasClosedEyes = preset.eyes.mode === "closed";
        setPathVisibility(leftClosedEye, hasClosedEyes);
        setPathVisibility(rightClosedEye, hasClosedEyes);
        leftClosedEye.setAttribute("d", hasClosedEyes ? preset.eyes.left : "");
        rightClosedEye.setAttribute(
          "d",
          hasClosedEyes ? preset.eyes.right : "",
        );

        setPathVisibility(leftBrow, Boolean(preset.brows));
        setPathVisibility(rightBrow, Boolean(preset.brows));
        leftBrow.setAttribute(
          "d",
          buildAdjustableBrowPath(preset.brows?.left, "left"),
        );
        rightBrow.setAttribute(
          "d",
          buildAdjustableBrowPath(preset.brows?.right, "right"),
        );

        mouthLine.setAttribute("d", preset.mouth.d);
        mouthLine.style.fill = preset.mouth.fill;
        mouthLine.style.strokeWidth = debugState.mouthStroke;
        sleepZs.style.display = preset.zzz ? "" : "none";

        if (shouldSave) {
          localStorage.setItem(faceStorageKey, nextExpression);
        }

        if (shouldSyncAnimation) {
          applyAnimationState(faceAnimationMap[nextExpression], shouldSave);
        }
      };

      const coerceDebugValue = (key, value, fallback = debugDefaults[key]) => {
        const limits = controlLimits[key];
        const numericValue = Number(value);

        if (!Number.isFinite(numericValue)) {
          return fallback;
        }

        const clampedValue = Math.min(
          limits.max,
          Math.max(limits.min, numericValue),
        );

        return decimalDebugKeys.has(key)
          ? Number(clampedValue.toFixed(2))
          : Math.round(clampedValue);
      };

      const formatValue = (key, value) =>
        decimalDebugKeys.has(key)
          ? Number(value).toFixed(2)
          : Math.round(value);

      const normalizeDebugState = (state) =>
        debugKeys.reduce(
          (normalizedState, key) => ({
            ...normalizedState,
            [key]: coerceDebugValue(key, state[key], debugDefaults[key]),
          }),
          {},
        );

      const applyDebugState = (shouldSave = false) => {
        debugState = normalizeDebugState(debugState);

        Object.values(eyeParts).forEach((eyePart) => {
          const eyeOffset =
            debugState.eyeX + debugState.eyeSpacing * eyePart.direction;

          eyePart.line.setAttribute("cx", eyePart.lineCx + eyeOffset);
          eyePart.line.setAttribute("cy", eyePart.lineCy + debugState.eyeY);
          eyePart.line.setAttribute("rx", debugState.eyeRx);
          eyePart.line.setAttribute("ry", debugState.eyeRy);
          eyePart.line.style.strokeWidth = debugState.eyeStroke;
          eyePart.pupil.setAttribute("cx", eyePart.pupilCx + eyeOffset);
          eyePart.pupil.setAttribute("cy", eyePart.pupilCy + debugState.eyeY);
        });

        mouthLine.style.strokeWidth = debugState.mouthStroke;
        mouthGroup.setAttribute(
          "transform",
          [
            `translate(${debugState.mouthX} ${debugState.mouthY})`,
            "translate(462 430)",
            `scale(${debugState.mouthScale})`,
            "translate(-462 -430)",
          ].join(" "),
        );

        const headTransform = [
          "translate(450 350)",
          `scale(${debugState.headScaleX} ${debugState.headScaleY})`,
          "translate(-450 -350)",
        ].join(" ");

        headParts.forEach((part) => {
          part.setAttribute("transform", headTransform);
        });

        headBoxLines.forEach((line) => {
          line.style.strokeWidth = debugState.headStroke;
        });

        earLines.forEach((line) => {
          line.style.strokeWidth = debugState.earStroke;
        });

        const pantsHeightOffset = debugState.pantsHeight;
        const newPantsPath = `M334 786 Q392 816 450 816 Q508 817 566 786 L${587} ${867 + pantsHeightOffset} Q526 ${888 + pantsHeightOffset} 458 ${878 + pantsHeightOffset} Q444 ${876 + pantsHeightOffset} 430 ${878 + pantsHeightOffset} Q365 ${888 + pantsHeightOffset} 313 ${867 + pantsHeightOffset} Z`;
        pantsPath.setAttribute("d", newPantsPath);

        const seamStartY = 818 + debugState.seamY;
        const seamMidY = seamStartY + (debugState.seamLength / 2);
        const seamEndY = seamStartY + debugState.seamLength;
        const newSeamPath = `M450 ${seamStartY} Q451 ${seamMidY} 450 ${seamEndY}`;
        pantsSeam.setAttribute("d", newSeamPath);

        const leftShoulderX = 362 + debugState.leftShoulderX;
        const leftShoulderY = 544 + debugState.leftShoulderY;
        const leftHandX = 301 + debugState.leftHandX;
        const leftHandY = 795 + debugState.leftHandY;
        const leftCurve1X = 335 + debugState.leftArmCurve1X;
        const leftCurve1Y = 633 + debugState.leftArmCurve1Y;
        const leftCurve2X = 318 + debugState.leftArmCurve2X;
        const leftCurve2Y = 706 + debugState.leftArmCurve2Y;
        const newLeftArmPath = `M${leftShoulderX} ${leftShoulderY} C${leftCurve1X} ${leftCurve1Y} ${leftCurve2X} ${leftCurve2Y} ${leftHandX} ${leftHandY}`;
        leftArm.setAttribute("d", newLeftArmPath);
        leftHand.setAttribute("cx", leftHandX - 3);
        leftHand.setAttribute("cy", leftHandY + 20);

        const rightShoulderX = 538 + debugState.rightShoulderX;
        const rightShoulderY = 544 + debugState.rightShoulderY;
        const rightHandX = 599 + debugState.rightHandX;
        const rightHandY = 795 + debugState.rightHandY;
        const rightCurve1X = 565 + debugState.rightArmCurve1X;
        const rightCurve1Y = 633 + debugState.rightArmCurve1Y;
        const rightCurve2X = 582 + debugState.rightArmCurve2X;
        const rightCurve2Y = 706 + debugState.rightArmCurve2Y;
        const newRightArmPath = `M${rightShoulderX} ${rightShoulderY} C${rightCurve1X} ${rightCurve1Y} ${rightCurve2X} ${rightCurve2Y} ${rightHandX} ${rightHandY}`;
        rightArm.setAttribute("d", newRightArmPath);
        rightHand.setAttribute("cx", rightHandX + 3);
        rightHand.setAttribute("cy", rightHandY + 20);

        const leftEarTransform = [
          "translate(254 285)",
          `scale(${debugState.leftEarScale})`,
          "translate(-254 -285)",
          `translate(0 ${debugState.leftEarY})`,
        ].join(" ");
        leftEar.setAttribute("transform", leftEarTransform);

        const rightEarTransform = [
          "translate(646 285)",
          `scale(${debugState.rightEarScale})`,
          "translate(-646 -285)",
          `translate(0 ${debugState.rightEarY})`,
        ].join(" ");
        rightEar.setAttribute("transform", rightEarTransform);

        controls.forEach((control) => {
          const key = control.dataset.control;
          control.value = debugState[key];
          document.querySelector(`[data-number="${key}"]`).value = formatValue(
            key,
            debugState[key],
          );
        });

        applyFaceExpressionState(faceExpressionState);

        if (shouldSave) {
          localStorage.setItem(debugStorageKey, JSON.stringify(debugState));
        }
      };

      const setSaveStatus = (message) => {
        debugSaveStatus.textContent = message;
      };

      const getCurrentHtmlSource = async () => {
        try {
          const response = await fetch(window.location.href, {
            cache: "no-store",
          });

          if (response.ok) {
            return response.text();
          }
        } catch {
          // Fall back to the current DOM when the page is opened from a file.
        }

        return `<!doctype html>\n${document.documentElement.outerHTML}`;
      };

      const serializeConfigForHtml = (state) =>
        JSON.stringify(
          {
            ...normalizeDebugState(state),
            faceExpression: faceExpressionState,
            bodyAnimation: animationState,
          },
          null,
          2,
        ).replace(/^/gm, "      ");

      const buildSavedHtml = async () => {
        const htmlSource = await getCurrentHtmlSource();
        const savedConfig = serializeConfigForHtml(debugState);
        const configBlock = [
          '    <script id="characterConfig" type="application/json" data-character-config>',
          savedConfig,
          "    </scr" + "ipt>",
        ].join("\n");
        const configPattern =
          /<script id="characterConfig" type="application\/json" data-character-config>[\s\S]*?<\/script>/;

        if (configPattern.test(htmlSource)) {
          return htmlSource.replace(configPattern, configBlock);
        }

        return htmlSource.replace("</body>", `${configBlock}\n  </body>`);
      };

      const downloadSavedHtml = (htmlSource) => {
        const blob = new Blob([htmlSource], { type: "text/html" });
        const downloadUrl = URL.createObjectURL(blob);
        const downloadLink = document.createElement("a");

        downloadLink.href = downloadUrl;
        downloadLink.download = "meo-box-character.html";
        downloadLink.click();
        URL.revokeObjectURL(downloadUrl);
      };

      const writeSavedHtmlFile = async (htmlSource) => {
        if (!("showSaveFilePicker" in window) || !window.isSecureContext) {
          downloadSavedHtml(htmlSource);
          setSaveStatus("Downloaded saved HTML");
          return;
        }

        const fileHandle = await window.showSaveFilePicker({
          suggestedName: "meo-box-character.html",
          types: [
            {
              description: "HTML file",
              accept: { "text/html": [".html"] },
            },
          ],
        });
        const writableFile = await fileHandle.createWritable();

        await writableFile.write(htmlSource);
        await writableFile.close();
        setSaveStatus("Saved to HTML");
      };

      const saveDebugConfig = async () => {
        debugSave.disabled = true;
        setSaveStatus("Saving...");

        try {
          localStorage.setItem(debugStorageKey, JSON.stringify(debugState));
          localStorage.setItem(faceStorageKey, faceExpressionState);
          localStorage.setItem(animationStorageKey, animationState);

          // Update the embedded config in the current page
          const savedConfig = serializeConfigForHtml(debugState);
          configNode.textContent = "\n" + savedConfig + "\n    ";

          // Save to HTML file
          const htmlSource = await buildSavedHtml();
          await writeSavedHtmlFile(htmlSource);

          setSaveStatus("Saved successfully!");

          // Clear status after 2 seconds
          setTimeout(() => {
            setSaveStatus("");
          }, 2000);
        } catch (error) {
          console.error("Unable to save character config", error);
          setSaveStatus("Save failed");
        } finally {
          debugSave.disabled = false;
        }
      };

      controls.forEach((control) => {
        control.addEventListener("input", () => {
          debugState = {
            ...debugState,
            [control.dataset.control]: coerceDebugValue(
              control.dataset.control,
              control.value,
              debugState[control.dataset.control],
            ),
          };
          applyDebugState();
        });
      });

      numberInputs.forEach((numberInput) => {
        numberInput.addEventListener("input", () => {
          if (numberInput.value === "") {
            return;
          }

          debugState = {
            ...debugState,
            [numberInput.dataset.number]: coerceDebugValue(
              numberInput.dataset.number,
              numberInput.value,
              debugState[numberInput.dataset.number],
            ),
          };
          applyDebugState();
        });
      });

      debugToggle.addEventListener("click", () => {
        const isOpen = debugPanel.hidden;
        debugPanel.hidden = !isOpen;
        debugToggle.setAttribute("aria-expanded", String(isOpen));

        if (isOpen) {
          controls[0].focus();
        }
      });

      debugSave.addEventListener("click", saveDebugConfig);

      animationSelect.addEventListener("change", () => {
        applyAnimationState(animationSelect.value, true);
      });

      faceExpressionSelect.addEventListener("change", () => {
        applyFaceExpressionState(faceExpressionSelect.value, true, true);
      });

      debugReset.addEventListener("click", () => {
        debugState = { ...debugDefaults };
        faceExpressionState = "stable";
        animationState = "idle";
        localStorage.removeItem(faceStorageKey);
        localStorage.removeItem(animationStorageKey);
        setSaveStatus("");
        applyAnimationState(animationState);
        applyDebugState();
      });

      applyAnimationState(animationState);
      applyDebugState();
      applyFaceExpressionState(faceExpressionState);
    </script>
  </body>
</html>
