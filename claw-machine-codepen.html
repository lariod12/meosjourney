<style>
*,
::before,
::after {
  box-sizing: border-box;
}

body {
  padding: 0;
  margin: 0;
  font-family: sans-serif;
  background-color: #84dfe2;
  --brown: #57280f;
  --blue: #33a5da;
  --dark-blue: #3a94b7;
  --machine-color: #32c2db;
  --machine-width: 160px;
  --m: 2;
}

.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  min-height: 600px;
  flex-direction: column;
}

.pix,
.pix::before,
.pix::after {
  width: calc(var(--w) * var(--m));
  height: calc(var(--h) * var(--m));
  image-rendering: pixelated;
  background-size: calc(var(--w) * var(--m)) calc(var(--h) * var(--m));
}

.pix::before,
.pix::after {
  position: absolute;
  content: '';
}

/* Debug Overlay Styles */
.debug-overlay {
  position: absolute;
  pointer-events: none;
  z-index: 9999;
  border: 2px dashed red;
  background-color: rgba(255, 0, 0, 0.15);
}

.debug-claw {
  border: 3px solid #00ff00;
  background-color: rgba(0, 255, 0, 0.25);
  box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
}

.debug-collection {
  border: 3px solid #0066ff;
  background-color: rgba(0, 102, 255, 0.25);
  box-shadow: 0 0 10px rgba(0, 102, 255, 0.5);
}

.debug-collection::before,
.debug-collection::after {
  content: '';
  position: absolute;
  background-color: #0066ff;
  pointer-events: none;
}

.debug-collection::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}

.debug-collection::after {
  left: 0;
  top: 50%;
  width: 100%;
  height: 2px;
  transform: translateY(-50%);
}

.debug-drop {
  border: 3px solid #ff7a00;
  background-color: rgba(255, 122, 0, 0.25);
  box-shadow: 0 0 10px rgba(255, 122, 0, 0.5);
}

.debug-label {
  position: absolute;
  top: -25px;
  left: 0;
  background: rgba(0, 0, 0, 0.9);
  color: white;
  padding: 3px 8px;
  font-size: 11px;
  font-weight: bold;
  white-space: nowrap;
  pointer-events: none;
  border-radius: 3px;
  font-family: monospace;
}

.debug-trajectory {
  position: absolute;
  pointer-events: none;
  z-index: 9998;
  border-left: 3px dashed #ff00ff;
  opacity: 0;
  transition: opacity 0.3s;
}

.debug-trajectory.active {
  opacity: 0.8;
}

.debug-info-panel {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0, 0, 0, 0.9);
  color: #00ff00;
  padding: 12px;
  font-family: monospace;
  font-size: 12px;
  border: 2px solid #00ff00;
  border-radius: 5px;
  z-index: 10000;
  min-width: 250px;
  box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
}

.debug-info-panel .title {
  color: #ffff00;
  font-weight: bold;
  margin-bottom: 8px;
  border-bottom: 1px solid #00ff00;
  padding-bottom: 4px;
}

.debug-info-panel .row {
  margin: 4px 0;
  display: flex;
  justify-content: space-between;
}

.debug-info-panel .label {
  color: #00ffff;
}

.debug-info-panel .value {
  color: #ffffff;
  font-weight: bold;
}

.claw-machine {
  display: flex;
  flex-direction: column;
  border: 2px solid var(--brown);
  overflow: hidden;
}

.collection-box {
  --h: 32px;
  width: calc(var(--m) * var(--machine-width));
  margin: calc(var(--m) * var(--h) * -1 - 10px) 0 24px;
  display: flex;
  align-items: bottom;
  justify-content: start;
}

.collection-box .toy-wrapper {
  position: relative;
  width: calc(100% / 6);
  display: flex;
  align-items: end;
  justify-content: center;
}

.collection-box .toy-wrapper .toy::after {
  top: auto;
  bottom: 0;
}

.toy-wrapper.squeeze-in {
  width: 0;
  animation: squeeze-in forwards 0.4s;
  animation-delay: 1.4s;
}

@keyframes squeeze-in {
  0% {
    width: 0;
  }
  100% {
    width: calc(100% / 6);
  }
}

@keyframes show-toy-2 {
  0% {
    opacity: 0;
    transform: translateY(-100vh);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.toy-wrapper .toy {
  opacity: 0;
  transform: translateY(-100vh);
  animation: forwards show-toy-2 0.8s;
  animation-delay: 1s;
}

  position: absolute;

}

}

.active {

}

  let bestScore = Infinity;

  for (let attempt = 0; attempt < 20000; attempt++) {
    const position = {
      x: randomN(minX, maxX),
      y: randomN(minY, maxY)
    };
    const toyRect = { ...position, w: size.w, h: size.h };
    const overlapsDropZone = doRectsOverlap(toyRect, dropZone, dropPadding);
    const overlapScore = elements.toys.reduce(
    (total, toy) => total + getOverlapArea(toyRect, toy),
    0);

    if (!overlapsDropZone && overlapScore === 0) {
      return position;
    }

    if (!overlapsDropZone && overlapScore < bestScore) {
      bestPosition = position;
      bestScore = overlapScore;
    }
  }

  const candidates = [
  { x: baseX, y: baseY },
  { x: dropZone.x + dropZone.w + cornerBuffer, y: baseY },
  { x: baseX, y: dropZone.y - size.h - cornerBuffer },
  { x: maxX, y: baseY },
  { x: machineWidth / 2 - size.w / 2, y: minY }];

  const safeCandidates = candidates.
  map(({ x, y }) => ({
    x: clamp(x, minX, maxX),
    y: clamp(y, minY, maxY)
  }));
  const avoidsDropAndToys = safeCandidates.find(position => {
    const toyRect = { ...position, w: size.w, h: size.h };
    const overlapsDropZone = doRectsOverlap(toyRect, dropZone, dropPadding);
    const overlapsToy = elements.toys.some(toy =>
    doRectsOverlap(toyRect, toy));
    return !overlapsDropZone && !overlapsToy;
  });

  return avoidsDropAndToys ||
  bestPosition ||
  safeCandidates.find(position =>
  !doRectsOverlap({ ...position, w: size.w, h: size.h }, dropZone, dropPadding)) ||
  safeCandidates[0];
};

class Button {
  constructor({
    className,
    action = () => {},
    isLocked,
    pressAction = () => {},
    releaseAction = () => {}
  }) {
    Object.assign(this, {
      el: document.querySelector(`.${className}`),
      isLocked });

    this.el.addEventListener('click', action);
    ['mousedown', 'touchstart'].forEach((action) =>
    this.el.addEventListener(action, pressAction));

    ['mouseup', 'touchend'].forEach((action) =>
    this.el.addEventListener(action, releaseAction));


    if (!isLocked) this.activate();
  }
  activate() {
    this.isLocked = false;
    this.el.classList.add('active');
  }
  deactivate() {
    this.isLocked = true;
    this.el.classList.remove('active');
  }}

class JoystickControl {
  constructor({ className }) {
    Object.assign(this, {
      el: document.querySelector(`.${className}`),
      stick: document.querySelector(`.${className} .joystick-stick`),
      isLocked: true,
      isPressed: false,
      activeKeys: new Set(),
      vectorKey: '0,0'
    });

    this.el.addEventListener('pointerdown', event => {
      event.preventDefault();
      this.el.setPointerCapture?.(event.pointerId);
      this.press(event);
    });
    this.el.addEventListener('pointermove', event => {
      if (!this.isPressed) return;
      event.preventDefault();
      this.moveFromPointer(event);
    });
    ['pointerup', 'pointercancel'].forEach(action =>
    this.el.addEventListener(action, () => this.release()));
    this.el.addEventListener('keydown', event => {
      const direction = this.getDirectionFromKey(event.key);
      if (!direction) return;
      event.preventDefault();
      this.activeKeys.add(direction);
      this.moveVector(this.getVectorFromKeys());
    });
    this.el.addEventListener('keyup', event => {
      const direction = this.getDirectionFromKey(event.key);
      if (!direction) return;
      event.preventDefault();
      this.activeKeys.delete(direction);
      if (!this.activeKeys.size) {
        this.release();
        return;
      }
      this.moveVector(this.getVectorFromKeys());
    });
  }
  activate() {
    this.isLocked = false;
    this.el.classList.add('active');
    this.el.setAttribute('aria-label', 'Move claw');
  }
  deactivate() {
    this.isLocked = true;
    this.isPressed = false;
    this.activeKeys.clear();
    this.vectorKey = '0,0';
    this.stick.style.transform = '';
    this.el.classList.remove(
    'active',
    'pushed-left',
    'pushed-right',
    'pushed-up',
    'pushed-down');
  }
  press(event) {
    if (this.isLocked || this.isPressed || settings.isGrabInProgress) return;

    this.isPressed = true;
    this.moveFromPointer(event);
  }
  release() {
    if (!this.isPressed) return;

    this.isPressed = false;
    this.activeKeys.clear();
    this.vectorKey = '0,0';
    this.stick.style.transform = '';
    this.el.classList.remove('pushed-left', 'pushed-right', 'pushed-up', 'pushed-down');
    this.stopMovement();
    grabBtn.activate();
  }
  getDirectionFromKey(key) {
    return {
      ArrowLeft: 'left',
      ArrowRight: 'right',
      ArrowUp: 'up',
      ArrowDown: 'down'
    }[key];
  }
  getVectorFromKeys() {
    return {
      x:
      (this.activeKeys.has('right') ? 1 : 0) -
      (this.activeKeys.has('left') ? 1 : 0),
      y:
      (this.activeKeys.has('down') ? 1 : 0) -
      (this.activeKeys.has('up') ? 1 : 0)
    };
  }
  getVectorFromPointer(event) {
    const rect = this.el.getBoundingClientRect();
    const x = event.clientX - rect.left - rect.width / 2;
    const y = event.clientY - rect.top - rect.height / 2;
    const deadZone = rect.width * 0.12;

    return {
      x: Math.abs(x) < deadZone ? 0 : Math.sign(x),
      y: Math.abs(y) < deadZone ? 0 : Math.sign(y)
    };
  }
  moveFromPointer(event) {
    this.moveVector(this.getVectorFromPointer(event));
  }
  moveVector(vector) {
    if (this.isLocked || settings.isGrabInProgress) return;
    const normalizedVector = {
      x: Math.max(-1, Math.min(1, vector.x || 0)),
      y: Math.max(-1, Math.min(1, vector.y || 0))
    };
    const vectorKey = `${normalizedVector.x},${normalizedVector.y}`;
    if (this.vectorKey === vectorKey && this.isPressed) return;

    this.isPressed = true;
    this.stopMovement();
    this.vectorKey = vectorKey;
    this.el.classList.remove('pushed-left', 'pushed-right', 'pushed-up', 'pushed-down');

    if (!normalizedVector.x && !normalizedVector.y) {
      this.stick.style.transform = '';
      return;
    }

    if (normalizedVector.x < 0) this.el.classList.add('pushed-left');
    if (normalizedVector.x > 0) this.el.classList.add('pushed-right');
    if (normalizedVector.y < 0) this.el.classList.add('pushed-up');
    if (normalizedVector.y > 0) this.el.classList.add('pushed-down');
    this.setStickVector(normalizedVector);
    arm.el.classList.remove('missed');

    if (normalizedVector.x) {
      vertRail.move({
        moveKey: 'x',
        target: normalizedVector.x > 0 ?
        machineWidth - armJoint.w - machineBuffer.x :
        machineBuffer.x });
    }

    if (normalizedVector.y) {
      armJoint.move({
        moveKey: 'y',
        target: normalizedVector.y < 0 ?
        machineBuffer.y :
        machineTopHeight - machineBuffer.y });
    }
  }
  setStickVector(vector) {
    const offsetX = vector.x * m * 3;
    const offsetY = vector.y * m * 4;
    const rotate = (vector.x + vector.y) * 12;
    this.stick.style.transform =
    `translate(${offsetX}px, ${offsetY}px) rotate(${rotate}deg)`;
  }
  stopMovement() {
    [vertRail, armJoint].forEach(obj => {
      clearInterval(obj.interval);
      obj.interval = null;
    });
  }}


class WorldObject {
  constructor(props) {
    Object.assign(this, {
      x: 0,
      y: 0,
      z: 0,
      angle: 0,
      transformOrigin: { x: 0, y: 0 },
      interval: null,
      default: {},
      moveWith: [],
      el: props.className && document.querySelector(`.${props.className}`),
      ...props });

    this.setStyles();
    if (props.className) {
      const { width, height } = this.el.getBoundingClientRect();
      this.w = width;
      this.h = height;
    }
    ;['x', 'y', 'w', 'h'].forEach(key => {
      this.default[key] = this[key];
    });
  }
  setStyles() {
    Object.assign(this.el.style, {
      left: `${this.x}px`,
      top: !this.bottom && `${this.y}px`,
      bottom: this.bottom,
      width: `${this.w}px`,
      height: `${this.h}px`,
      transformOrigin: this.transformOrigin });

    this.el.style.zIndex = this.z;
  }
  setClawPos(clawPos) {
    this.clawPos = clawPos;
  }
  setTransformOrigin(transformOrigin) {
    this.transformOrigin =
    transformOrigin === 'center' ?
    'center' :
    `${transformOrigin.x}px ${transformOrigin.y}px`;
    this.setStyles();
  }
  handleNext(next) {
    clearInterval(this.interval);
    if (next) next();
  }
  resumeMove({ moveKey, target, moveTime, next }) {
    this.interval = null;
    this.move({ moveKey, target, moveTime, next });
  }
  resizeShadow() {
    elements.box.style.setProperty('--scale', 0.5 + this.h / maxArmLength / 2);
  }
  move({ moveKey, target, moveTime, next }) {
    if (this.interval) {
      this.handleNext(next);
    } else {
      const moveTarget = target || this.default[moveKey];
      this.interval = setInterval(() => {
        const distance =
        Math.abs(this[moveKey] - moveTarget) < 10 ?
        Math.abs(this[moveKey] - moveTarget) :
        10;
        const increment = this[moveKey] > moveTarget ? -distance : distance;
        if (
        increment > 0 ?
        this[moveKey] < moveTarget :
        this[moveKey] > moveTarget)
        {
          this[moveKey] += increment;
          this.setStyles();
          if (moveKey === 'h') this.resizeShadow();
          if (this.moveWith.length) {
            this.moveWith.forEach(obj => {
              if (!obj) return;
              obj[moveKey === 'h' ? 'y' : moveKey] += increment;
              obj.setStyles();
            });
          }
        } else {
          this.handleNext(next);
        }
      }, moveTime || 100);
    }
  }
  distanceBetween(target) {
    return Math.round(
    Math.sqrt(
    Math.pow(this.x - target.x, 2) + Math.pow(this.y - target.y, 2)));


  }}


class Toy extends WorldObject {
  constructor(props) {
    const toyType = sortedToys[props.index];
    const size = toys[toyType];
    const spawnPosition = getToySpawnPosition(props.index, size);
    super({
      el: Object.assign(document.createElement('div'), {
        className: `toy pix ${toyType}` }),

      x: spawnPosition.x,
      y: spawnPosition.y,
      z: 0,
      toyType,
      ...size,
      ...props });

    elements.box.append(this.el);
    const toy = this;

    this.el.addEventListener('click', () => this.collectToy(toy));
    elements.toys.push(this);
  }
  collectToy(toy) {
    toy.el.classList.remove('selected');
    toy.x = machineWidth / 2 - toy.w / 2;
    toy.y = machineHeight / 2 - toy.h / 2;
    toy.z = 7;
    toy.el.style.setProperty('--rotate-angle', '0deg');
    toy.setTransformOrigin('center');
    toy.el.classList.add('display');
    elements.clawMachine.classList.add('show-overlay');
    settings.collectedNumber++;
    elements.collectionBox.appendChild(
    Object.assign(document.createElement('div'), {
      className: `toy-wrapper ${
      settings.collectedNumber > 6 ? 'squeeze-in' : ''
      }`,
      innerHTML: `<div class="toy pix ${toy.toyType}"></div>` }));


    setTimeout(() => {
      elements.clawMachine.classList.remove('show-overlay');
      if (!document.querySelector('.selected'))
      elements.collectionArrow.classList.remove('active');
    }, 1000);
  }
  setRotateAngle() {
    const angle =
    radToDeg(
    Math.atan2(
    this.y + this.h / 2 - this.clawPos.y,
    this.x + this.w / 2 - this.clawPos.x)) -

    90;
    const adjustedAngle = Math.round(adjustAngle(angle));
    this.angle =
    adjustedAngle < 180 ? adjustedAngle * -1 : 360 - adjustedAngle;
    this.el.style.setProperty('--rotate-angle', `${this.angle}deg`);
  }}

const doOverlap = (a, b) => {
  return b.x > a.x && b.x < a.x + a.w && b.y > a.y && b.y < a.y + a.h;
};

const isToyInCollectionPoint = toy => {
  const toyRect = toy.el.getBoundingClientRect();
  const pointRect = elements.collectionPoint.getBoundingClientRect();
  const toyCenterX = toyRect.left + toyRect.width / 2;
  const bottomTolerance = m * 3;

  return (
  toyCenterX >= pointRect.left &&
  toyCenterX <= pointRect.right &&
  toyRect.bottom >= pointRect.top &&
  toyRect.bottom <= pointRect.bottom + bottomTolerance);
};

const getClosestToy = () => {
  const claw = {
    y: armJoint.y + maxArmLength + machineBuffer.y + 7,
    x: armJoint.x + 7,
    w: 40,
    h: 32 };

  const overlappedToys = elements.toys.filter(t => {
    return doOverlap(t, claw);
  });

  if (overlappedToys.length) {
    const toy = overlappedToys.sort((a, b) => b.index - a.index)[0];
    toy.setTransformOrigin({
      x: claw.x - toy.x,
      y: claw.y - toy.y });

    toy.setClawPos({
      x: claw.x,
      y: claw.y });

    settings.targetToy = toy;
  }
};

  settings.isGrabInProgress = false;

const dropToy = () => {
  arm.el.classList.add('open');
  const droppedToy = settings.targetToy;
  settings.targetToy = null;

  if (droppedToy) {
    droppedToy.z = 3;
    droppedToy.move({
      moveKey: 'y',
      target: machineHeight - droppedToy.h - 30,
      moveTime: 50,
      next: () => {
        droppedToy.el.classList.remove('grabbed');
        arm.el.classList.remove('open');

        if (isToyInCollectionPoint(droppedToy)) {
          droppedToy.el.classList.add('selected');
          elements.collectionArrow.classList.add('active');
        } else if (!document.querySelector('.selected')) {
          elements.collectionArrow.classList.remove('active');
        }
      } });

    [vertRail, armJoint, arm].forEach(obj => obj.moveWith[0] = null);
    return;
  }

  setTimeout(() => {
    arm.el.classList.remove('open');
    activateHoriBtn();

};

const grabToy = () => {

    ;[vertRail, armJoint, arm].forEach(
    obj => obj.moveWith[0] = settings.targetToy);

    settings.targetToy.el.classList.add('grabbed');
  } else {
    arm.el.classList.add('missed');
  }
};

const startGrabSequence = () => {
  if (grabBtn.isLocked || settings.isGrabInProgress) return;

  grabBtn.deactivate();

              next: () => {

  }, 500);
};

function updateDebugOverlays() {
  const machineRect = elements.clawMachine.getBoundingClientRect();
  const armJointRect = armJoint.el.getBoundingClientRect();
  const clawShadowStyle = getComputedStyle(armJoint.el, '::before');
  const shadowOffsetX = parseFloat(clawShadowStyle.marginLeft) || 0;
  const shadowOffsetY = parseFloat(clawShadowStyle.marginTop) || 0;
  const claw = {
    x: armJointRect.left + shadowOffsetX - machineRect.left,
    y: armJointRect.top + shadowOffsetY - machineRect.top,
    w: parseFloat(clawShadowStyle.width) || 40,
    h: parseFloat(clawShadowStyle.height) || 32
  };

  // Update claw debug overlay
  if (debugOverlays.claw) {
    const clawScreenX = machineRect.left + claw.x;
    const clawScreenY = machineRect.top + claw.y;

    debugOverlays.claw.style.left = `${clawScreenX}px`;
    debugOverlays.claw.style.top = `${clawScreenY}px`;
    debugOverlays.claw.style.width = `${claw.w}px`;
    debugOverlays.claw.style.height = `${claw.h}px`;

    debugState.clawPos = { x: Math.round(claw.x), y: Math.round(claw.y) };
  }

  const dropRect = elements.dropZone.getBoundingClientRect();

  if (debugOverlays.dropZone) {
    debugOverlays.dropZone.style.left = `${dropRect.left}px`;
    debugOverlays.dropZone.style.top = `${dropRect.top}px`;
    debugOverlays.dropZone.style.width = `${dropRect.width}px`;
    debugOverlays.dropZone.style.height = `${dropRect.height}px`;

    debugState.dropZonePos = {
      x: Math.round(dropRect.left - machineRect.left),
      y: Math.round(dropRect.top - machineRect.top),
      w: Math.round(dropRect.width),
      h: Math.round(dropRect.height)
    };
  }

  // The collection check uses the toy bottom-center point inside this zone.
  const pointRect = elements.collectionPoint.getBoundingClientRect();
  const bottomTolerance = m * 3; // m = 2, so tolerance = 6px

  if (debugOverlays.collection) {
    debugOverlays.collection.style.left = `${pointRect.left}px`;
    debugOverlays.collection.style.top = `${pointRect.top}px`;
    debugOverlays.collection.style.width = `${pointRect.width}px`;
    debugOverlays.collection.style.height = `${pointRect.height + bottomTolerance}px`;

    debugState.collectionPos = {
      x: Math.round(pointRect.left - machineRect.left),
      y: Math.round(pointRect.top - machineRect.top),
      w: Math.round(pointRect.width),
      h: Math.round(pointRect.height + bottomTolerance)
    };
  }

  // Update trajectory line
  if (debugOverlays.trajectory && settings.targetToy) {
    const clawCenterX = machineRect.left + claw.x + claw.w / 2;
    const clawBottomY = machineRect.top + claw.y + claw.h;
    const collectionCenterX = pointRect.left + pointRect.width / 2;

    debugOverlays.trajectory.style.left = `${clawCenterX}px`;
    debugOverlays.trajectory.style.top = `${clawBottomY}px`;
    debugOverlays.trajectory.style.height = `${pointRect.top - clawBottomY}px`;
    debugOverlays.trajectory.classList.add('active');
  } else if (debugOverlays.trajectory) {
    debugOverlays.trajectory.classList.remove('active');
  }

  // Calculate distance
  const clawCenterX = claw.x + claw.w / 2;
  const clawCenterY = claw.y + claw.h / 2;
  const colCenterX = debugState.collectionPos.x + debugState.collectionPos.w / 2;
  const colCenterY = debugState.collectionPos.y + debugState.collectionPos.h / 2;
  debugState.distance = Math.round(
    Math.sqrt(Math.pow(clawCenterX - colCenterX, 2) + Math.pow(clawCenterY - colCenterY, 2))
  );

  // Update info panel
  if (debugOverlays.infoPanel) {
    document.getElementById('debug-claw-x').textContent = debugState.clawPos.x + 'px';
    document.getElementById('debug-claw-y').textContent = debugState.clawPos.y + 'px';
    document.getElementById('debug-drop-x').textContent = debugState.dropZonePos.x + 'px';
    document.getElementById('debug-drop-y').textContent = debugState.dropZonePos.y + 'px';
    document.getElementById('debug-col-x').textContent = debugState.collectionPos.x + 'px';
    document.getElementById('debug-col-y').textContent = debugState.collectionPos.y + 'px';
    document.getElementById('debug-distance').textContent = debugState.distance + 'px';

    const toyName = settings.targetToy ? settings.targetToy.toyType : 'None';
    document.getElementById('debug-toy').textContent = toyName;

    let status = 'Idle';
    if (settings.targetToy) {
      if (settings.targetToy.el.classList.contains('grabbed')) {
        status = 'Grabbed';
      } else if (settings.targetToy.el.classList.contains('selected')) {
        status = 'Collected';
      } else {
        status = 'Targeting';
      }
    }
    document.getElementById('debug-status').textContent = status;
  }
}

// Initialize debug overlays
debugOverlays.claw = createDebugOverlay('debug-claw', 'CLAW ZONE (40x32px)', 'debug-claw');
debugOverlays.dropZone = createDebugOverlay('debug-drop-zone', 'DROP ZONE', 'debug-drop');
debugOverlays.collection = createDebugOverlay('debug-collection', 'COLLECT CENTER (6px)', 'debug-collection');
debugOverlays.trajectory = createTrajectoryLine();
debugOverlays.infoPanel = createInfoPanel();

// Update overlays on animation frame
function animateDebug() {
  updateDebugOverlays();
  requestAnimationFrame(animateDebug);
}

animateDebug();
